name: Update profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main
    paths:
      - README.tpl.md
      - .github/workflows/readme.yml

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate README from template
        uses: muesli/readme-scribe@master
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        with:
          template: README.tpl.md
          writeTo: README.md

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update README [skip ci]"
          file_pattern: README.md
          skip_dirty_check: false
          commit_user_name: readme-scribe[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: readme-scribe[bot] <41898282+github-actions[bot]@users.noreply.github.com>
